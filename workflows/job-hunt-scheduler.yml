name: Job Hunt Daily Pipeline

on:
  schedule:
    # Roda todo dia às 7:00 AM (5:00 AM UTC)
    - cron: '0 5 * * *'
    # Roda todo dia às 2:00 PM (12:00 UTC)
    - cron: '0 12 * * *'
  
  # Permite rodar manualmente via GitHub Actions tab
  workflow_dispatch:

jobs:
  job-hunt-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Set up Gmail credentials
        run: |
          # Cria credenciais.json de forma segura
          # IMPORTANTE: você precisa configurar isso manualmente uma vez
          echo "⚠️  Nota: Gmail API requer setup inicial no seu computador"
          echo "Se este é o primeiro run, pode falhar. Isso é normal."
      
      - name: Run Job Hunt Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Roda a Semana 4 pipeline (tudo: ingest → parse → eval → digest)
          python src/week4_pipeline.py --digest-only || true
          
          # Se tiver novas vagas, também gera dashboard
          python src/dashboard.py || true
      
      - name: Commit and push updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Job Hunt Bot"
          
          # Adiciona arquivos atualizados (digests, dashboard)
          git add digests/ || true
          
          # Só faz commit se houver mudanças
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "🤖 Daily job hunt pipeline run - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          )

      - name: Notify on completion
        if: always()
        run: |
          echo "✅ Job Hunt Pipeline completed at $(date)"
          echo "📊 Check digests/digest_latest.txt for today's jobs"
          echo "📈 Dashboard: digests/dashboard.html"
